<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App</title>
    <style>
        #splash {
            position: fixed; inset: 0; z-index: 50;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            transition: opacity 0.6s ease;
        }
        #splash.hide { opacity: 0; pointer-events: none; }
        .splash-title {
            font-size: 28px; font-weight: 500; letter-spacing: -0.5px;
            margin-bottom: 6px; color: #e8e8e8;
        }
        .splash-sub {
            font-size: 15px; color: #888; margin-bottom: 40px; font-weight: 300;
        }
        .start-btn {
            background: #1a1a1a; color: #fff; border: 1px solid #333;
            padding: 14px 36px; border-radius: 8px; font-size: 16px;
            font-weight: 500; cursor: pointer; transition: background 0.2s;
        }
        .start-btn:hover { background: #222; border-color: #555; }

        /* Anti-cópia */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        body { -webkit-touch-callout: none; }

        #ui-container { position: relative; z-index: 1; }
        body {
            background-color: #121212;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
        }

        #ui-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type="file"] {
            display: none;
        }

        .upload-btn {
            background: #222;
            color: #eee;
            padding: 16px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #333;
            transition: background 0.15s;
            display: inline-flex;
            align-items: center;
        }
        .upload-btn:hover { background: #2a2a2a; border-color: #555; }

        #mainCanvas {
            width: 100%;
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
        }

        #resultBox {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
        }

        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            width: 100%;
        }

        .action-btn {
            flex: 1;
            background: #2a2a2a;
            color: #fff;
            text-align: center;
            padding: 16px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            text-decoration: none;
            border: 1px solid #444;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover { background: #333; }

        #loadingBox {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #3a82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="font-size: 22px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: #e0e0e0; margin-bottom: 8px;">Animador de Traço</h1>
    <p style="font-size: 14px; color: #666; margin-bottom: 36px; font-weight: 300; opacity: 0;"></p>
    <button class="start-btn" onclick="startApp()">Iniciar</button>
</div>

<div id="ui-container">
    <div id="uploadBox">
        <label for="imageInput" class="upload-btn">
            <svg style="margin-right: 8px;" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Selecionar Desenho
        </label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <canvas id="mainCanvas" width="1280" height="720" style="width: 100%; max-width: 100%; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none;"></canvas>

    <div id="resultBox">
        <video id="resVideo" controls loop playsinline style="width: 100%; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></video>
    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const uploadBox = document.getElementById('uploadBox');
    const loadingBox = document.getElementById('loadingBox');
    const resultBox = document.getElementById('resultBox');
    const resVideo = document.getElementById('resVideo');
    const canvas = document.getElementById('mainCanvas');
    const videoCtx = canvas.getContext('2d');

    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = 1280;
    bgCanvas.height = 720;
    const ctx = bgCanvas.getContext('2d');

    const p_back = "M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z";
    const p_undo = "M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z";
    const p_redo = "M11.5 8C6.85 8 2.92 11.03 1.38 14.72l2.37.78C4.8 12.31 7.81 10 11.5 10c1.96 0 3.73.72 5.12 1.88L13 15.5h9v-9l-3.6 3.6C16.55 8.99 14.15 8 11.5 8z";
    const p_brush = "M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34c-.39-.39-1.02-.39-1.41 0L9 12.25 11.75 15l8.96-8.96c.39-.39.39-1.02 0-1.41z";
    const p_eraser = "M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.77-.78 2.04 0 2.83L5.03 20h7.66l8.72-8.73c.78-.77.78-2.04 0-2.83l-4.85-4.85c-.39-.39-.9-.59-1.42-.59zM15.14 5.83l2.03 2.02-2.83 2.83-2.02-2.02 2.82-2.83zM10.9 7.24l2.02 2.02-7.07 7.07-2.02-2.02 7.07-7.07z";
    const p_layers = "M11.99 18.54l-7.37-5.73L3 14.07l9 7 9-7-1.63-1.27-7.38 5.74zM12 16l7.36-5.73L21 9l-9-7-9 7 1.63 1.27L12 16z";
    const p_move = "M10 9h4V6h3l-5-5-5 5h3v3zm-1 1H6V7l-5 5 5 5v-3h3v-4zm14 2l-5-5v3h-3v4h3v3l5-5zm-9 3h-4v3H7l5 5 5-5h-3v-3z";
    const p_wand = "M7.5 5.6L5 7l1.4-2.5L5 2l2.5 1.4L10 .9 8.6 3.4 10 5.9 7.5 5.6zm12 9.8l-2.5-1.4 1.4 2.5-1.4 2.5 2.5-1.4 2.5 1.4-1.4-2.5 1.4-2.5-2.5 1.4zM22 2l-2.5 1.4L18.1.9l1.4 2.5-1.4 2.5 2.5-1.4L22 5.9l-1.4-2.5L22 2zm-7.63 5.29c-.39-.39-1.02-.39-1.41 0L1.32 18.8c-.39.39-.39 1.02 0 1.41l2.47 2.47c.39.39 1.02.39 1.41 0l11.64-11.64c.39-.39.39-1.02 0-1.41l-2.47-2.47z";
    const p_text = "M2.5 4v3h5v12h3V7h5V4h-13z";
    const p_drop = "M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2c0-3.32-2.67-7.25-8-11.8zM12 20c-3.35 0-6-2.57-6-6.2 0-2.34 1.95-5.44 6-9.14 4.05 3.7 6 6.79 6 9.14 0 3.63-2.65 6.2-6 6.2z";

    let drawingPaths = [];
    let mediaRecorder;
    let recordedChunks = [];

    function startApp() {
        document.getElementById('splash').classList.add('hide');
    }

    // Anti-cópia
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'v' || e.key === 'C' || e.key === 'V' || e.key === 'x' || e.key === 'X' || e.key === 'a' || e.key === 'A')) e.preventDefault();
    });

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        uploadBox.style.display = 'none';

        canvas.style.display = 'block'; 

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                setTimeout(() => processAndAnimate(img), 50);
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    function drawIcon(ctx, pathD, cx, cy, scale = 1.5, color = '#ffffff') {
        ctx.save();
        ctx.translate(cx - 12 * scale, cy - 12 * scale);
        ctx.scale(scale, scale);
        ctx.fillStyle = color;
        ctx.fill(new Path2D(pathD));
        ctx.restore();
    }

    function updateRightBar(sliderVal, color = '#ffffff') {
        const w = canvas.width; const h = canvas.height;
        ctx.fillStyle = '#252525';
        ctx.fillRect(w - 60, 50, 60, h - 105);

        ctx.beginPath();
        ctx.arc(w - 30, 90, 18, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#444';
        ctx.fillRect(w - 33, 130, 6, 100);

        const sliderY = 130 + (1 - sliderVal) * 92;
        ctx.fillStyle = '#fff';
        ctx.fillRect(w - 37, sliderY, 14, 8);
    }

    function updateBottomBar(activeTool) {
        const w = canvas.width; const h = canvas.height;
        ctx.fillStyle = '#2d2d2d';
        ctx.fillRect(0, h - 55, w, 55);

        drawIcon(ctx, p_undo, 40, h - 28, 1.3, '#aaaaaa');
        drawIcon(ctx, p_redo, 90, h - 28, 1.3, '#aaaaaa');

        if (activeTool === 'brush') {
            ctx.fillStyle = '#3a82f6';
            ctx.beginPath(); ctx.arc(w / 2 - 50, h - 28, 22, 0, Math.PI * 2); ctx.fill();
            drawIcon(ctx, p_brush, w / 2 - 50, h - 28, 1.3, '#ffffff');
            drawIcon(ctx, p_eraser, w / 2 + 50, h - 28, 1.3, '#aaaaaa');
        } else {
            ctx.fillStyle = '#3a82f6';
            ctx.beginPath(); ctx.arc(w / 2 + 50, h - 28, 22, 0, Math.PI * 2); ctx.fill();
            drawIcon(ctx, p_brush, w / 2 - 50, h - 28, 1.3, '#aaaaaa');
            drawIcon(ctx, p_eraser, w / 2 + 50, h - 28, 1.3, '#ffffff');
        }

        drawIcon(ctx, p_layers, w - 60, h - 28, 1.3, '#aaaaaa');
        ctx.font = '14px sans-serif';
        ctx.fillStyle = '#aaaaaa';
        ctx.textAlign = 'center';
        ctx.fillText('1', w - 30, h - 23);
    }

    function drawFakeAppUI() {
        const w = canvas.width; const h = canvas.height;

        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, w, h);

        ctx.fillStyle = '#2d2d2d';
        ctx.fillRect(0, 0, w, 50);
        drawIcon(ctx, p_back, 25, 25, 1.2);

        ctx.fillStyle = '#e0e0e0';
        ctx.font = '18px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('Minha Galeria', 45, 31);
        ctx.textAlign = 'center';
        ctx.fillText('100%   Sem título_1', w / 2, 31);

        ctx.fillStyle = '#252525';
        ctx.fillRect(0, 50, 55, h - 105);
        drawIcon(ctx, p_move, 27, 90, 1.1, '#aaaaaa');
        drawIcon(ctx, p_wand, 27, 140, 1.1, '#aaaaaa');
        drawIcon(ctx, p_text, 27, 190, 1.1, '#aaaaaa');
        drawIcon(ctx, p_drop, 27, 240, 1.1, '#aaaaaa');

        updateRightBar(0.5);
        updateBottomBar('brush');
    }

    function processAndAnimate(img) {
        const MAX_W = 800;
        let targetW = img.width;
        let targetH = img.height;
        if (targetW > MAX_W) {
            targetH = Math.floor((targetH * MAX_W) / targetW);
            targetW = MAX_W;
        }

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = targetW;
        tempCanvas.height = targetH;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.fillStyle = 'white';
        tempCtx.fillRect(0, 0, targetW, targetH);
        tempCtx.drawImage(img, 0, 0, targetW, targetH);

        const data = tempCtx.getImageData(0, 0, targetW, targetH).data;
        const grid = new Uint8Array(targetW * targetH);
        const pixelColors = new Array(targetW * targetH);
        const pixelList = [];

        for (let i = 0; i < data.length; i += 4) {
            let r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
            let luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
            // Captura qualquer pixel não-branco (inclui pretos, cores, cinzas)
            if (a > 128 && luma < 248) {
                let idx = i / 4;
                grid[idx] = 1;
                pixelColors[idx] = {r: r, g: g, b: b};
                pixelList.push(idx);
            }
        }

        drawingPaths = [];
        const visited = new Uint8Array(targetW * targetH);

        for (let i = 0; i < pixelList.length; i++) {
            let startIdx = pixelList[i];
            if (visited[startIdx]) continue;

            let path = [];
            let currentIdx = startIdx;
            visited[currentIdx] = 1;

            while (true) {
                let cy = Math.floor(currentIdx / targetW);
                let cx = currentIdx % targetW;
                path.push({x: cx, y: cy, r: pixelColors[currentIdx].r, g: pixelColors[currentIdx].g, b: pixelColors[currentIdx].b});

                let bestNext = -1;
                let bestDist = Infinity;

                for (let r = 1; r <= 3; r++) {
                    for (let dy = -r; dy <= r; dy++) {
                        for (let dx = -r; dx <= r; dx++) {
                            let nx = cx + dx;
                            let ny = cy + dy;
                            if (nx >= 0 && nx < targetW && ny >= 0 && ny < targetH) {
                                let nIdx = ny * targetW + nx;
                                if (grid[nIdx] === 1 && visited[nIdx] === 0) {
                                    let dist = dx*dx + dy*dy;
                                    if (dist < bestDist) {
                                        bestDist = dist;
                                        bestNext = nIdx;
                                    }
                                }
                            }
                        }
                    }
                    if (bestNext !== -1) break; 
                }

                if (bestNext !== -1) {
                    visited[bestNext] = 1;
                    currentIdx = bestNext;
                } else {
                    break;
                }
            }
            if (path.length > 5) drawingPaths.push(path);
        }

        drawingPaths.sort((a, b) => {
            let areaA = Math.floor(a[0].y / 100) + Math.floor(a[0].x / 100);
            let areaB = Math.floor(b[0].y / 100) + Math.floor(b[0].x / 100);
            return (areaA - areaB) + (Math.random() - 0.5) * 5;
        });

        drawFakeAppUI();

        const wsX = 65;
        const wsY = 60;
        const wsW = 1280 - 135;
        const wsH = 720 - 125;

        const scale = Math.min((wsW - 40) / targetW, (wsH - 40) / targetH);
        const paperW = targetW * scale;
        const paperH = targetH * scale;
        const paperX = wsX + (wsW - paperW) / 2;
        const paperY = wsY + (wsH - paperH) / 2;

        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(paperX, paperY, paperW, paperH);
        ctx.shadowColor = 'transparent';

        for (let i = 0; i < drawingPaths.length; i++) {
            for (let j = 0; j < drawingPaths[i].length; j++) {
                drawingPaths[i][j].x = drawingPaths[i][j].x * scale + paperX;
                drawingPaths[i][j].y = drawingPaths[i][j].y * scale + paperY;
            }
        }

        recordedChunks = [];
        try {

            const stream = canvas.captureStream(24); 
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp8', videoBitsPerSecond: 1500000 });
        } catch (e) {
            mediaRecorder = new MediaRecorder(canvas.captureStream(24)); 
        }

        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            resVideo.src = url;

            canvas.style.display = 'none';
            resultBox.style.display = 'flex';
        };

        mediaRecorder.start();

        let currentPathIdx = 0;
        let currentPointIdx = 0;
        let pixelsPerFrame = Math.max(10, Math.floor(drawingPaths.flat().length / 300));
        let prevPoint = null;
        let currentDrawColor = '#ffffff';

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        let currentSliderVal = 0.5;
        let targetSliderVal = 0.5;
        let isPausedForUI = false;

        function drawFrame() {
            if (isPausedForUI) return; 

            if (Math.abs(currentSliderVal - targetSliderVal) > 0.01) {
                currentSliderVal += (targetSliderVal - currentSliderVal) * 0.15;
            }

            ctx.beginPath();
            let pathFinished = false;

            let baseWidth = 0.5 + (currentSliderVal * 2.5);
            ctx.lineWidth = (baseWidth + Math.random() * 0.3) * scale;

            let lastHx = 0, lastHy = 0;

            for (let i = 0; i < pixelsPerFrame; i++) {
                if (currentPathIdx >= drawingPaths.length) {
                    updateBottomBar('brush');

                    videoCtx.clearRect(0, 0, 1280, 720);
                    videoCtx.drawImage(bgCanvas, 0, 0);

                    setTimeout(() => {
                        mediaRecorder.stop();
                    }, 1000);
                    return;
                }

                let path = drawingPaths[currentPathIdx];
                let pt = path[currentPointIdx];

                let jitter = currentPointIdx === 0 ? 1.5 : 0.6;
                let hx = pt.x + (Math.random() - 0.5) * jitter;
                let hy = pt.y + (Math.random() - 0.5) * jitter;

                if (currentPointIdx === 0) {
                    ctx.beginPath();
                    ctx.moveTo(hx, hy);
                    prevPoint = {x: hx, y: hy, r: pt.r, g: pt.g, b: pt.b};
                    currentDrawColor = `rgb(${pt.r}, ${pt.g}, ${pt.b})`;
                    lastHx = hx;
                    lastHy = hy;
                } else {
                    if (!prevPoint) {
                        prevPoint = {x: hx, y: hy, r: pt.r, g: pt.g, b: pt.b};
                    }
                    ctx.beginPath();
                    ctx.moveTo(prevPoint.x, prevPoint.y);
                    ctx.lineTo(hx, hy);
                    ctx.strokeStyle = `rgb(${pt.r}, ${pt.g}, ${pt.b})`;
                    ctx.stroke();
                    currentDrawColor = `rgb(${pt.r}, ${pt.g}, ${pt.b})`;
                    prevPoint = {x: hx, y: hy, r: pt.r, g: pt.g, b: pt.b};
                    lastHx = hx;
                    lastHy = hy;
                }

                currentPointIdx++;

                if (currentPointIdx >= path.length) {
                    currentPathIdx++;
                    currentPointIdx = 0;
                    pathFinished = true;
                    prevPoint = null;
                    break;
                }
            }

            videoCtx.clearRect(0, 0, 1280, 720);
            videoCtx.drawImage(bgCanvas, 0, 0);
            updateRightBar(currentSliderVal, currentDrawColor);

            if (!pathFinished) {
                let cursorSize = (baseWidth * scale) / 2;

                videoCtx.beginPath();
                videoCtx.arc(lastHx, lastHy, cursorSize + 1, 0, Math.PI * 2);
                videoCtx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
                videoCtx.lineWidth = 1.5;
                videoCtx.stroke();

                videoCtx.beginPath();
                videoCtx.arc(lastHx, lastHy, cursorSize + 2.5, 0, Math.PI * 2);
                videoCtx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                videoCtx.lineWidth = 1;
                videoCtx.stroke();
            }

            let delay = 0;
            if (pathFinished) {
                delay = 20 + Math.random() * 60;

                if (Math.random() < 0.15) {
                    targetSliderVal = 0.2 + Math.random() * 0.6; 
                }

                if (Math.random() < 0.07) {
                    isPausedForUI = true;
                    delay = 0;
                    setTimeout(() => {
                        updateBottomBar('eraser'); 

                        videoCtx.clearRect(0, 0, 1280, 720);
                        videoCtx.drawImage(bgCanvas, 0, 0);

                        setTimeout(() => {
                            updateBottomBar('brush'); 
                            isPausedForUI = false; 
                            requestAnimationFrame(drawFrame);
                        }, 150 + Math.random() * 200); 
                    }, 50 + Math.random() * 150); 
                }
            }

            if (!isPausedForUI) {
                if (delay > 0) setTimeout(() => requestAnimationFrame(drawFrame), delay);
                else requestAnimationFrame(drawFrame);
            }
        }

        requestAnimationFrame(drawFrame);
    }
</script>

</body>
</html>

name: Build APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Instalar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compilar APK de Debug
        id: build
        continue-on-error: true
        run: |
          gradle assembleDebug --no-daemon --stacktrace > build.log 2>&1
          cat build.log
          exit $?

      - name: Publicar APK como artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: "Resumo de erros"
        if: always() && steps.build.outcome == 'failure'
        run: |
          grep -nE "FAILURE:|What went wrong|> Task .*FAILED|e: file|error:|Could not (resolve|find)|failed to find|SDK location|Execution failed|Caused by" build.log | head -40 || echo "Nenhum padrão de erro encontrado no build.log"

      - name: Falhar se o build deu erro
        if: steps.build.outcome == 'failure'
        run: exit 1
